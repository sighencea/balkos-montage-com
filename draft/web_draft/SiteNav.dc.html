<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="font-family:'IBM Plex Sans',sans-serif;width:100%;">
  <!-- Utility strip -->
  <div style="background:#0F2540;color:#AEBccf;border-bottom:1px solid #18324f;">
    <div style="max-width:1280px;margin:0 auto;padding:0 32px;height:40px;display:flex;align-items:center;justify-content:space-between;">
      <div style="font-family:'IBM Plex Mono',monospace;font-size:11.5px;letter-spacing:0.14em;text-transform:uppercase;color:#7E93AC;white-space:nowrap;overflow:hidden;">
        Industrial Project Execution &nbsp;·&nbsp; Refineries &nbsp;·&nbsp; Chemical &nbsp;·&nbsp; Petrochemical &nbsp;·&nbsp; Foundries
      </div>
      <div style="display:flex;align-items:center;gap:24px;font-size:12.5px;color:#C2D0E0;white-space:nowrap;flex:none;">
        <a href="tel:+4900000000" style="display:flex;align-items:center;gap:7px;color:#C2D0E0;text-decoration:none;font-family:'IBM Plex Mono',monospace;letter-spacing:0.04em;">
          <span style="color:#C16A33;font-weight:700;">T</span> +49 (0) 000 000 00
        </a>
        <span style="width:1px;height:14px;background:#2c466a;"></span>
        <a href="mailto:info@balkos-montage.de" style="color:#C2D0E0;text-decoration:none;font-family:'IBM Plex Mono',monospace;letter-spacing:0.04em;">info@balkos-montage.de</a>
        <span style="width:1px;height:14px;background:#2c466a;"></span>
        <span style="font-family:'IBM Plex Mono',monospace;font-size:11.5px;letter-spacing:0.08em;"><span style="color:#fff;font-weight:600;">DE</span> <span style="color:#5d7693;">/ EN</span></span>
      </div>
    </div>
  </div>

  <!-- Main bar -->
  <div style="background:#ffffff;border-bottom:1px solid #DCE0E5;">
    <div style="max-width:1280px;margin:0 auto;padding:0 32px;height:82px;display:flex;align-items:center;justify-content:space-between;">
      <a href="Home.dc.html" style="display:flex;align-items:center;flex:none;">
        <img src="assets/logo.jpg" alt="Balkos Montage" style="height:38px;display:block;" />
      </a>
      <nav style="display:flex;align-items:stretch;height:82px;gap:2px;">
        <sc-for list="{{ items }}" as="it" hint-placeholder-count="9">
          <a href="{{ it.href }}" style="{{ it.style }}">
            <span style="{{ it.dotStyle }}"></span>{{ it.label }}
          </a>
        </sc-for>
      </nav>
      <a href="Contact.dc.html" style="flex:none;background:#C16A33;color:#fff;font-size:13.5px;font-weight:600;letter-spacing:0.04em;text-decoration:none;padding:13px 22px;display:flex;align-items:center;gap:9px;" style-hover="background:#a9582a;">
        Request a Quote
        <span style="font-family:'IBM Plex Mono',monospace;font-weight:400;">→</span>
      </a>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:130},&quot;active&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;home&quot;,&quot;services&quot;,&quot;industries&quot;,&quot;projects&quot;,&quot;clients&quot;,&quot;compliance&quot;,&quot;careers&quot;,&quot;about&quot;,&quot;contact&quot;],&quot;default&quot;:&quot;home&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const active = this.props.active || 'home';
    const links = [
      { key: 'home', label: 'Home', href: 'Home.dc.html' },
      { key: 'services', label: 'Services', href: 'Services.dc.html' },
      { key: 'industries', label: 'Industries', href: 'Industries.dc.html' },
      { key: 'projects', label: 'Projects', href: 'Projects.dc.html' },
      { key: 'clients', label: 'Our Clients', href: 'Clients.dc.html', prominent: true },
      { key: 'compliance', label: 'Compliance', href: 'Compliance.dc.html' },
      { key: 'careers', label: 'Careers', href: 'Careers.dc.html' },
      { key: 'about', label: 'About', href: 'About.dc.html' },
      { key: 'contact', label: 'Contact', href: 'Contact.dc.html' },
    ];
    const items = links.map(l => {
      const isActive = l.key === active;
      const base = "position:relative;display:flex;align-items:center;height:82px;padding:0 13px;font-size:14px;text-decoration:none;letter-spacing:0.01em;box-sizing:border-box;border-bottom:3px solid " + (isActive ? '#C16A33' : 'transparent') + ";";
      const color = isActive ? '#0F2540' : (l.prominent ? '#0F2540' : '#51606E');
      const weight = isActive ? 700 : (l.prominent ? 600 : 500);
      return {
        label: l.label,
        href: l.href,
        style: base + "color:" + color + ";font-weight:" + weight + ";",
        dotStyle: l.prominent ? "display:inline-block;width:5px;height:5px;background:#C16A33;margin-right:7px;flex:none;" : "display:none;",
      };
    });
    return { items };
  }
}
</script>
</body>
</html>
