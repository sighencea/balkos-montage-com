<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Page not found | Balkos Montage</title>
<meta name="robots" content="noindex, follow">
<!-- Root-relative paths: GitHub Pages may serve this 404 at any URL depth -->
<link rel="icon" href="/assets/img/favicon.ico" sizes="any">
<link rel="icon" type="image/png" href="/assets/img/favicon-32.png">
<link rel="apple-touch-icon" href="/assets/img/apple-touch-icon.png">
<link rel="stylesheet" href="/css/styles.css">
<style>
  .nf{min-height:100vh;display:flex;flex-direction:column;background:var(--navy-deep);}
  .nf-bar{border-bottom:1px solid var(--navy-hair2);}
  .nf-bar .container{height:82px;display:flex;align-items:center;}
  .nf-bar img{height:30px;width:auto;display:block;}
  .nf-main{flex:1;display:flex;align-items:center;}
  .nf-main .container{padding-top:64px;padding-bottom:64px;}
  .nf-code{font-family:var(--mono);font-size:12px;letter-spacing:0.2em;text-transform:uppercase;color:var(--orange-light);display:flex;align-items:center;gap:12px;}
  .nf-code::before{content:"";width:24px;height:1px;background:var(--orange);display:inline-block;}
  .nf h1{color:#fff;font-size:60px;font-weight:700;letter-spacing:-0.02em;line-height:1.05;margin:22px 0 0;}
  .nf p{color:var(--on-navy);font-size:18px;line-height:1.6;margin:18px 0 0;max-width:560px;}
  .nf-links{margin-top:34px;display:flex;gap:14px;flex-wrap:wrap;}
  .nf-quick{margin-top:42px;font-family:var(--mono);font-size:12.5px;letter-spacing:0.04em;color:var(--mono-navy);display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  .nf-quick a{color:var(--on-navy-muted);text-decoration:none;}
  .nf-quick a:hover{color:#fff;}
  .nf-foot{border-top:1px solid var(--navy-hair2);}
  .nf-foot .container{padding:18px 0;font-size:12px;color:#5d7693;display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap;}
  .nf-foot a{color:var(--on-navy-muted);text-decoration:none;}
  @media (max-width:560px){.nf h1{font-size:42px;}}
</style>
</head>
<body>
<div class="nf">
  <div class="nf-bar">
    <div class="container">
      <a href="/" aria-label="Balkos Montage — Home"><img src="/assets/img/logo.png" alt="Balkos Montage"></a>
    </div>
  </div>

  <div class="nf-main">

        <a href="/about.html">About</a>
      </nav>
    </div>
  </div>

  <div class="nf-foot">
    <div class="container">
      <span>© <span data-year>2026</span> BALKOS INDUSTRIE MONTAGE SRL</span>
      <a href="mailto:liviu.pop@balkos-montage.com">liviu.pop@balkos-montage.com</a>
    </div>
  </div>
</div>
<script>document.querySelectorAll('[data-year]').forEach(function(e){e.textContent=new Date().getFullYear();});</script>
