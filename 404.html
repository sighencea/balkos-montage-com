<style>
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{font-family:'IBM Plex Sans',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;}
  a{color:inherit;}
  .nf{min-height:100vh;display:flex;flex-direction:column;background:#fff;color:#3D4A57;}
  .container{max-width:1280px;margin:0 auto;padding:0 32px;width:100%;}
  .nf-bar{border-bottom:1px solid #DCE0E5;}
  .nf-bar .container{height:82px;display:flex;align-items:center;}
  .nf-bar img{height:26px;width:auto;display:block;}
  .nf-main{flex:1;display:flex;align-items:center;}
  .nf-main .container{padding-top:72px;padding-bottom:72px;}
  .nf-code{font-family:'IBM Plex Mono',ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;letter-spacing:0.2em;text-transform:uppercase;color:#C16A33;display:flex;align-items:center;gap:12px;}

  .nf h1{color:#0F2540;font-size:60px;font-weight:700;letter-spacing:-0.02em;line-height:1.05;margin:22px 0 0;}
  .nf p{color:#6B7785;font-size:18px;line-height:1.6;margin:18px 0 0;max-width:560px;}
  .nf-links{margin-top:34px;display:flex;gap:14px;flex-wrap:wrap;}
  .btn{display:inline-flex;align-items:center;gap:9px;font-size:14.5px;font-weight:600;letter-spacing:0.03em;text-decoration:none;padding:15px 26px;border:1px solid transparent;transition:background .15s,border-color .15s,color .15s;}
  .btn .arrow{font-family:'IBM Plex Mono',ui-monospace,monospace;font-weight:400;}
  .btn-primary{background:#C16A33;color:#fff;}
  .btn-primary:hover{background:#A9582A;}
  .btn-outline{background:transparent;color:#0F2540;border-color:#0F2540;}
  .btn-outline:hover{background:#0F2540;color:#fff;}
  .nf-quick{margin-top:44px;font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:12.5px;letter-spacing:0.04em;color:#9AA6B2;display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  .nf-quick a{color:#6B7785;text-decoration:none;}
  .nf-quick a:hover{color:#0F2540;}
  .nf-foot{border-top:1px solid #DCE0E5;}
  .nf-foot .container{padding:18px 32px;font-size:12px;color:#9AA6B2;display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap;}
  .nf-foot a{color:#6B7785;text-decoration:none;}
  .nf-foot a:hover{color:#0F2540;}
  @media (max-width:560px){.nf h1{font-size:42px;}.container{padding:0 20px;}.nf-foot .container{padding:18px 20px;}}
</style>
